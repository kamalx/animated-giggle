media:
  input: src/assets/blog
  output: /assets/blog
content:
  - name: posts
    label: Posts
    type: collection
    path: 'src/blog'
    view:
      fields: [ title, description, author, date, tags, image, imageAlt, published ]
    fields:
      - name: published
        label: Published
        type: boolean
        default: true
      - name: date
        label: Date
        type: date
      - name: title
        label: Title
        type: string
      - name: description
        label: Description or Excerpt
        type: string
      - name: tags
        label: Tags
        type: select
        options:
          creatable: true
          multiple: true
          values: [ featured, news ]
      - name: image
        label: Feature Image
        type: image
      - name: imageAlt
        label: Image Caption
        type: string
      - name: body
        label: Body
        type: rich-text
  - name: site
    label: Site settings
    path: src/_data/site.json
    type: file
    fields:
      - name: title
        label: Website title
        type: string
      - name: description
        label: Website description
        type: string
        description: Will be used for any page with no description.
      - name: url
        label: Website URL
        type: string
        pattern: ^(https?:\/\/)?(www\.)?[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}(\/[^\s]*)?$
      - name: cover
        label: Preview image
        type: image
        description: Image used in the social preview on social networks (e.g. Facebook, Twitter...)
